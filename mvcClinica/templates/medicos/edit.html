{% extends 'base.html' %}

{% block title %} MEDICOS | EDIT {% endblock %}

{% block content %}
<h1>Editar medico</h1>
<form action="{{ url_for('medico.edit', id_medico=medico.id_medico) }}" method="POST">
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" name="nombre" value="{{ medico.nombre }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Especialidad</label>
        <input type="text" class="form-control" name="especialidad" value="{{ medico.especialidad }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Telefono</label>
        <input type="text" class="form-control" name="telefono" value="{{ medico.telefono }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" class="form-control" name="correo" value="{{ medico.correo }}" required>
    </div>

    <button type="submit" class="btn btn-primary">Actualizar medico</button>
</form>
{% endblock %}
